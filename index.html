  <body>
    <div>
        <div class="p-2">

       <div class="main-card d-flex flex-column justify-content-center">
            <h1>Bookmark Your Favorite Sites</h1>
            <div class="form-card">
            <form id="bookmarkForm" class="text-left">
                <label class="text-left" for="siteNameInput">Site Name</label><br />
                <input id="siteNameInput" type="text" placeholder="Enter Site Name">
                <p id="siteNameErrMsg"></p> <br />
                <label for="siteUrlInput">Site Url</label> <br />
                <input id="siteUrlInput" placeholder="Enter Site Url" type="text">
                <p id="siteUrlErrMsg"></p> <br />
                <button type="submit"></button>
            </form>
        </div>
       </div>
    </div>
